services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes
      POSTGRES_PASSWORD: notes
      POSTGRES_DB: notes
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - wal_level=logical

  electric:
    image: electricsql/electric
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://notes:notes@db:5432/notes
      ELECTRIC_INSECURE: 'true'
    ports:
      - '3001:3000'
    depends_on:
      - db

volumes:
  pg_data:
